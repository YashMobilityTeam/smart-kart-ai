name: smart_kart_ai
description: AI-powered e-commerce platform for internal teams.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management & DI ───────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ─── Networking ──────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ─── Storage ─────────────────────────────────────────────────────────────
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2   # JWT token storage (encrypted)
  flutter_dotenv: ^5.1.0           # .env API key management

  # ─── Localization (modular, future-ready) ────────────────────────────────
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # ─── Image Handling ───────────────────────────────────────────────────────
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # ─── Keyboard / Input ────────────────────────────────────────────────────
  flutter_keyboard_visibility: ^6.0.0

  # ─── Utilities ───────────────────────────────────────────────────────────
  equatable: ^2.0.5
  logger: ^2.3.0
  go_router: ^13.2.0

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ─── Testing ─────────────────────────────────────────────────────────────
  mockito: ^5.4.4

  # ─── Linting ─────────────────────────────────────────────────────────────
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true             # Enables l10n code generation

  assets:
    - .env.dev
    - .env.qa
    - .env.prod
    - assets/images/
    - assets/icons/

  fonts: []

